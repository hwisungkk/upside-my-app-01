name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    # [공급망 공격 방어] CI 환경에서도 7일 지연 룰 적용
    env:
      UV_EXCLUDE_NEWER: "7 days" 

    steps:
      - uses: actions/checkout@v4

      # 1. uv 설치 및 Lock 파일 캐싱 설정
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 2. DevSecOps 표준 설치 (pip install 대신 uv sync)
      - name: Install dependencies
        run: uv sync --frozen

      # 3. 안전하게 격리된 환경에서 테스트 실행
      - name: Run tests
        run: uv run pytest --tb=short -q
